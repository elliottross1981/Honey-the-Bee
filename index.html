<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honey the Virtual Bee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #a7f3d0 0%, #ecfdf5 100%);
            transition: background 2s ease; 
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Weather Overrides */
        body.raining { background: linear-gradient(135deg, #64748b 0%, #94a3b8 100%) !important; }
        body.night-mode { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%) !important; }

        #canvas-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
        }

        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            transition: background 2s ease, border 2s ease;
        }
        body.night-mode .glass, body.raining .glass {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
        }
        body.night-mode .text-slate-600, body.raining .text-slate-600 { color: #cbd5e1; }
        body.night-mode h1, body.raining h1 { color: #fcd34d; }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 4px; }

        @keyframes floatUpAndFade {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
            100% { transform: translateY(-60px) scale(1.5); opacity: 0; }
        }
        .floating-emoji {
            position: absolute;
            pointer-events: none;
            animation: floatUpAndFade 2s ease-out forwards;
            z-index: 100;
            font-weight: 800;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            transform: translate(-50%, -50%);
            color: #334155;
        }
        body.night-mode .floating-emoji, body.raining .floating-emoji { color: #f8fafc; }
        
        .cursor-plant { cursor: crosshair !important; }
    </style>
</head>
<body class="w-screen h-screen relative text-slate-800" id="main-body">

    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div class="absolute top-4 left-4 right-4 md:right-auto md:w-80 flex flex-col gap-3 z-40 pointer-events-none">
        
        <!-- Stats Panel -->
        <div class="glass rounded-2xl p-4 pointer-events-auto shadow-lg">
            <div class="flex justify-between items-center mb-1">
                <h1 class="text-xl font-bold text-amber-700 flex items-center gap-2">
                    🐝 Honey's Dashboard
                </h1>
                <button id="toggle-audio" class="p-2 rounded-full bg-white/50 hover:bg-white/80 transition-colors shadow-sm" title="Toggle Buzz Sound">
                    🔇
                </button>
            </div>
            
            <div class="flex justify-between items-center mb-3 pb-2 border-b border-black/10">
                <span id="sync-status" class="text-xs font-semibold text-emerald-600">☁️ Cloud Sync Active</span>
                <span id="life-stage" class="text-xs font-bold text-purple-600 px-2 py-1 bg-purple-100 rounded">Stage: Egg</span>
            </div>
            
            <div class="space-y-3">
                <div>
                    <div class="flex justify-between text-xs font-bold mb-1 uppercase tracking-wide text-slate-600">
                        <span>Energy</span><span id="val-energy">100%</span>
                    </div>
                    <div class="h-2.5 w-full bg-black/10 rounded-full overflow-hidden shadow-inner">
                        <div id="bar-energy" class="h-full bg-amber-400 rounded-full transition-all duration-300 w-full"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-xs font-bold mb-1 uppercase tracking-wide text-slate-600">
                        <span>Hunger</span><span id="val-hunger">100%</span>
                    </div>
                    <div class="h-2.5 w-full bg-black/10 rounded-full overflow-hidden shadow-inner">
                        <div id="bar-hunger" class="h-full bg-green-400 rounded-full transition-all duration-300 w-full"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-xs font-bold mb-1 uppercase tracking-wide text-slate-600">
                        <span>Happiness</span><span id="val-happiness">100%</span>
                    </div>
                    <div class="h-2.5 w-full bg-black/10 rounded-full overflow-hidden shadow-inner">
                        <div id="bar-happiness" class="h-full bg-pink-400 rounded-full transition-all duration-300 w-full"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-xs font-bold mb-1 uppercase tracking-wide text-slate-600">
                        <span>Tiredness</span><span id="val-tiredness">0%</span>
                    </div>
                    <div class="h-2.5 w-full bg-black/10 rounded-full overflow-hidden shadow-inner">
                        <div id="bar-tiredness" class="h-full bg-blue-400 rounded-full transition-all duration-300 w-0"></div>
                    </div>
                </div>

                <div class="pt-2 border-t border-black/10 flex justify-between items-center">
                    <div class="flex flex-col">
                        <span class="text-xs font-bold uppercase tracking-wide text-slate-600">Nectar Gathered</span>
                        <span id="val-nectar" class="font-bold text-amber-500">0 drops</span>
                    </div>
                    <div class="flex flex-col text-right">
                        <span class="text-xs font-bold uppercase tracking-wide text-slate-600">Honey Made</span>
                        <span id="val-honey" class="font-bold text-amber-500 text-lg">0.00 🍯</span>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-2 mt-4">
                <button id="btn-treat" class="w-full py-2 rounded-xl bg-pink-500 text-white font-bold shadow-md hover:bg-pink-600 transition text-sm">
                    💧 Food
                </button>
                <button id="btn-seed" class="w-full py-2 rounded-xl bg-emerald-500 text-white font-bold shadow-md hover:bg-emerald-600 transition text-sm">
                    🌱 Plant Seed
                </button>
            </div>
            <div id="seed-timer" class="text-center text-xs font-bold text-emerald-600 mt-2 hidden"></div>
        </div>

        <!-- Customization -->
        <div class="glass rounded-2xl p-4 text-sm pointer-events-auto shadow-lg">
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <span class="font-semibold text-slate-600">Fuzz Color:</span>
                    <input type="color" id="inp-color" value="#E6A122" class="w-8 h-8 rounded cursor-pointer border-0 p-0 bg-transparent">
                </div>
                <div class="flex justify-between items-center">
                    <span class="font-semibold text-slate-600">Accessory:</span>
                    <select id="sel-accessory" class="bg-white/50 border border-black/10 rounded px-2 py-1 outline-none">
                        <option value="none" class="text-black">None</option>
                        <option value="tophat" class="text-black">Top Hat</option>
                        <option value="crown" class="text-black">Gold Crown</option>
                        <option value="flowercrown" class="text-black">Flower Crown</option>
                        <option value="bowtie" class="text-black">Red Bow Tie</option>
                    </select>
                </div>
                <div class="pt-2 border-t border-black/10 text-center">
                    <button id="btn-reset" class="text-xs bg-red-100 hover:bg-red-200 text-red-600 px-3 py-1.5 rounded shadow-sm transition">
                        Reset All Game Data
                    </button>
                </div>
            </div>
        </div>

        <!-- Notification Log -->
        <div class="glass rounded-2xl p-3 h-28 flex flex-col pointer-events-auto shadow-lg">
            <h2 class="font-bold text-slate-700 text-xs mb-1 uppercase tracking-wide">Honey's Diary</h2>
            <div id="log-container" class="flex-1 overflow-y-auto custom-scroll text-xs text-slate-700 space-y-1 pr-2 flex flex-col-reverse">
                <!-- Logs injected here -->
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        let db, auth, currentUser;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;

        const state = {
            birthDate: Date.now(), // Lifecycle tracking
            totalFood: 0,          // Nutritional food eaten
            stage: 'egg',          // egg, larva, adult
            hiveUnlocked: false,   // Unpacking the hive box
            children: 0,           // Number of offspring
            color: '#E6A122', 
            accessory: 'none',
            audioEnabled: false,
            isSleeping: false,
            friendsUnlocked: { butterfly: false, ladybug: false, grasshopper: false, firefly: false },
            seeds: [], // Upgraded to allow multiple seeds!
            stats: { energy: 100, hunger: 100, happiness: 100, tiredness: 0, nectar: 0, honeyJars: 0 } 
        };

        let isSceneReady = false;

        function calculateStage() {
            // Calculate age in real hours
            const ageMs = Date.now() - state.birthDate;
            const hoursOld = ageMs / (1000 * 60 * 60);
            const daysOld = ageMs / (1000 * 60 * 60 * 24);

            // Growth relies on age AND proper nutrition (Royal Jelly)
            const growthScore = daysOld + (state.totalFood / 30); 

            let newStage = 'egg';
            if (hoursOld >= 1.0) { // Hatches after 1 hour real time
                if (growthScore >= 2.0) newStage = 'adult';
                else newStage = 'larva';
            }

            if (state.stage !== newStage) {
                state.stage = newStage;
                logUI(`🎉 Honey has grown into a ${newStage}!`);
                if (typeof rebuildBeeMesh === 'function') rebuildBeeMesh();
                
                // Show box when becoming adult if hive not unlocked
                if (newStage === 'adult' && !state.hiveUnlocked) {
                    boxGroup.visible = true;
                    logUI("📦 A mysterious box has appeared in the garden!");
                }
            }
            
            document.getElementById('life-stage').innerText = `Stage: ${state.stage.charAt(0).toUpperCase() + state.stage.slice(1)}`;
            
            // Dynamic Button Update
            const treatBtn = document.getElementById('btn-treat');
            if (state.stage === 'larva') treatBtn.innerText = "💧 Feed Royal Jelly";
            else if (state.stage === 'adult') treatBtn.innerText = "💧 Sugar Water";
            else treatBtn.innerText = "💧 Food (Waiting to hatch)";

            // Calculate children (1 child per 1000 jars)
            const expectedChildren = Math.floor(state.stats.honeyJars / 1000);
            if (expectedChildren > state.children) {
                state.children = expectedChildren;
                logUI("🥚 Incredible! A new baby egg has appeared in the garden!");
                if (typeof updateChildrenMeshes === 'function') updateChildrenMeshes();
            }
        }

        function applyLoadedData(data) {
            state.birthDate = data.birthDate || state.birthDate;
            state.totalFood = data.totalFood || state.totalFood;
            state.stage = data.stage || state.stage;
            state.hiveUnlocked = data.hiveUnlocked || state.hiveUnlocked;
            state.children = data.children || state.children;
            state.stats = data.stats || state.stats;
            state.color = data.color || state.color;
            state.friendsUnlocked = data.friendsUnlocked || state.friendsUnlocked;
            
            // Handle migration from old 'seed' to new 'seeds' array
            state.seeds = data.seeds || [];
            if (data.seed && data.seed.active) {
                state.seeds.push({ id: Date.now(), plantedAt: data.seed.plantedAt, bloomed: data.seed.bloomed, position: data.seed.position });
            }
            
            document.getElementById('inp-color').value = state.color;
            document.getElementById('sel-accessory').value = data.accessory || 'none';
            
            if (!isSceneReady) return; // Prevent UI/3D updates before scene is built

            calculateStage();
            if (typeof applyBeeCustomization === 'function') applyBeeCustomization();
            updateStatsUI();
            checkFriends();
            
            hiveGroup.visible = state.hiveUnlocked;
            boxGroup.visible = !state.hiveUnlocked;

            logUI("Honey's memories loaded successfully! 🌻");
        }

        if (firebaseConfig) {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            };
            initAuth().then(() => {
                onAuthStateChanged(auth, async (user) => {
                    currentUser = user;
                    if (user) {
                        document.getElementById('sync-status').innerText = "☁️ Cloud Sync Active";
                        document.getElementById('sync-status').className = "text-xs font-semibold text-emerald-600";
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'honey_data', 'save_v10');
                        try { const snap = await getDoc(docRef); if (snap.exists()) applyLoadedData(snap.data()); } catch(e) {}
                    }
                });
            });
        } else {
            document.getElementById('sync-status').innerText = "💾 Local Save Active";
            document.getElementById('sync-status').className = "text-xs font-semibold text-blue-600";
            const localData = localStorage.getItem('honey_save_data_v10');
            if (localData) applyLoadedData(JSON.parse(localData));
        }

        setInterval(() => {
            calculateStage(); // Check growth regularly
            const dataToSave = { 
                birthDate: state.birthDate, totalFood: state.totalFood, stage: state.stage, hiveUnlocked: state.hiveUnlocked, children: state.children,
                stats: state.stats, color: state.color, accessory: document.getElementById('sel-accessory').value, 
                friendsUnlocked: state.friendsUnlocked, seeds: state.seeds, lastSaved: new Date().toISOString() 
            };
            if (db && currentUser) {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'honey_data', 'save_v10');
                setDoc(docRef, dataToSave, { merge: true }).catch(e => {});
            } else if (!firebaseConfig) {
                localStorage.setItem('honey_save_data_v10', JSON.stringify(dataToSave));
            }
        }, 5000);

        document.getElementById('btn-reset').addEventListener('click', async () => {
            state.birthDate = Date.now();
            state.totalFood = 0;
            state.stage = 'egg';
            state.hiveUnlocked = false;
            state.children = 0;
            state.stats = { energy: 100, hunger: 100, happiness: 100, tiredness: 0, nectar: 0, honeyJars: 0 };
            state.friendsUnlocked = { butterfly: false, ladybug: false, grasshopper: false, firefly: false };
            state.seeds = [];
            state.color = '#E6A122';
            
            document.getElementById('inp-color').value = state.color;
            document.getElementById('sel-accessory').value = 'none';
            if (db && currentUser) {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'honey_data', 'save_v10');
                await deleteDoc(docRef);
            } else if (!firebaseConfig) {
                localStorage.removeItem('honey_save_data_v10');
            }
            rebuildBeeMesh();
            applyBeeCustomization();
            updateStatsUI();
            checkFriends();
            hiveGroup.visible = false;
            boxGroup.visible = true;
            logUI("All game data wiped. A new egg has been laid!");
        });

        let audioCtx, oscillator, filter, gainNode;
        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            oscillator = audioCtx.createOscillator();
            oscillator.type = 'sawtooth'; oscillator.frequency.value = 75;
            filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 350; 
            gainNode = audioCtx.createGain(); gainNode.gain.value = 0; 
            oscillator.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
            oscillator.start();
        }
        function updateAudioBuzz(speed) {
            if (!state.audioEnabled || !audioCtx || state.stage !== 'adult') return; // Only adults buzz!
            if (state.isSleeping) {
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2);
                return;
            }
            const targetFreq = 75 + (speed * 100);
            const targetVol = 0.03 + (speed * 0.08);
            oscillator.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
            gainNode.gain.setTargetAtTime(Math.min(targetVol, 0.15), audioCtx.currentTime, 0.1);
        }
        const audioBtn = document.getElementById('toggle-audio');
        audioBtn.addEventListener('click', () => {
            if (!audioCtx) initAudio();
            state.audioEnabled = !state.audioEnabled;
            if (state.audioEnabled) {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                audioBtn.innerHTML = '🔊'; audioBtn.classList.add('bg-amber-100');
                audioBtn.classList.remove('bg-white/50');
            } else {
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                audioBtn.innerHTML = '🔇'; audioBtn.classList.remove('bg-amber-100');
                audioBtn.classList.add('bg-white/50');
            }
        });

        const logContainer = document.getElementById('log-container');
        function logUI(message) {
            const el = document.createElement('div');
            el.className = 'py-1 border-b border-black/5 last:border-0';
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            el.innerHTML = `<span class="opacity-50 mr-1 font-mono">[${time}]</span> ${message}`;
            logContainer.prepend(el);
            if(logContainer.children.length > 10) logContainer.removeChild(logContainer.lastChild);
        }
        
        const bars = { energy: document.getElementById('bar-energy'), hunger: document.getElementById('bar-hunger'), happiness: document.getElementById('bar-happiness'), tiredness: document.getElementById('bar-tiredness') };
        const vals = { energy: document.getElementById('val-energy'), hunger: document.getElementById('val-hunger'), happiness: document.getElementById('val-happiness'), tiredness: document.getElementById('val-tiredness'), nectar: document.getElementById('val-nectar'), honey: document.getElementById('val-honey') };

        function updateStatsUI() {
            state.stats.nectar = state.stats.nectar || 0;
            state.stats.honeyJars = state.stats.honeyJars || 0;

            ['energy', 'hunger', 'happiness'].forEach(stat => {
                state.stats[stat] = Math.max(0, Math.min(100, state.stats[stat]));
                bars[stat].style.width = state.stats[stat] + '%';
                vals[stat].innerText = Math.round(state.stats[stat]) + '%';
                if(state.stats[stat] < 25) bars[stat].style.backgroundColor = '#ef4444'; 
                else if(state.stats[stat] < 50) bars[stat].style.backgroundColor = '#f59e0b'; 
                else {
                    if(stat==='energy') bars[stat].style.backgroundColor = '#fbbf24';
                    if(stat==='hunger') bars[stat].style.backgroundColor = '#4ade80';
                    if(stat==='happiness') bars[stat].style.backgroundColor = '#f472b6';
                }
            });
            state.stats.tiredness = Math.max(0, Math.min(100, state.stats.tiredness));
            bars.tiredness.style.width = state.stats.tiredness + '%';
            vals.tiredness.innerText = Math.round(state.stats.tiredness) + '%';
            bars.tiredness.style.backgroundColor = state.stats.tiredness > 75 ? '#ef4444' : '#60a5fa';

            vals.nectar.innerText = `${Math.floor(state.stats.nectar)} drops`;
            vals.honey.innerText = `${state.stats.honeyJars.toFixed(2)} 🍯`; 
        }

        function spawnFloatingEmoji(emoji, position3D, sizeStr = '28px') {
            const pos = position3D.clone();
            pos.project(camera);
            const x = (pos.x * .5 + .5) * window.innerWidth;
            const y = (pos.y * -.5 + .5) * window.innerHeight;
            
            const driftX = (Math.random() - 0.5) * 40;
            const el = document.createElement('div');
            el.className = 'floating-emoji';
            el.innerText = emoji;
            el.style.left = `${x + driftX}px`;
            el.style.top = `${y}px`;
            el.style.fontSize = sizeStr;
            el.style.transform += ` rotate(${(Math.random() - 0.5) * 30}deg)`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xecfdf5, 0.015);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 35);
        camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5b6, 1.2); 
        dirLight.position.set(15, 30, 15);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -30; dirLight.shadow.camera.right = 30;
        dirLight.shadow.camera.top = 30; dirLight.shadow.camera.bottom = -30;
        dirLight.shadow.mapSize.width = 1024; dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        let isNightTime = false;
        let isRaining = false;
        let rainParticles = [];

        function updateEnvironment() {
            const hour = new Date().getHours();
            const isDay = hour >= 6 && hour < 19; 
            isNightTime = !isDay;
            
            // Random Rain Chance
            if (Math.random() < 0.1) isRaining = !isRaining;
            
            const bodyClass = document.getElementById('main-body').classList;
            
            if (isRaining) {
                bodyClass.add('raining');
                bodyClass.remove('night-mode');
                scene.fog.color.setHex(0x94a3b8);
                dirLight.color.setHex(0xe2e8f0);
                dirLight.intensity = 0.5;
                ambientLight.intensity = 0.6;
                if(!state.isSleeping && state.stage === 'adult') logUI("🌧️ It started raining! Honey is heading home.");
            } else if (isDay) {
                bodyClass.remove('night-mode', 'raining');
                document.getElementById('main-body').style.background = 'linear-gradient(135deg, #a7f3d0 0%, #ecfdf5 100%)';
                scene.fog.color.setHex(0xecfdf5);
                dirLight.color.setHex(0xfff5b6);
                dirLight.intensity = 1.2;
                ambientLight.intensity = 0.9;
            } else {
                bodyClass.add('night-mode');
                bodyClass.remove('raining');
                scene.fog.color.setHex(0x0f172a);
                dirLight.color.setHex(0xa5b4fc); 
                dirLight.intensity = 0.4;
                ambientLight.intensity = 0.4;
            }
        }
        updateEnvironment();
        setInterval(updateEnvironment, 60000); // Check every minute

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.ShadowMaterial({ opacity: 0.12 }));
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- THE HIVE & THE BOX (Clickable) ---
        const hiveGroup = new THREE.Group();
        const hiveMat = new THREE.MeshStandardMaterial({color: 0xdaa520, roughness: 0.9}); 
        for(let i=0; i<6; i++) {
            const radius = 4 - (i * 0.6);
            const ring = new THREE.Mesh(new THREE.TorusGeometry(radius, 0.8, 16, 32), hiveMat);
            ring.position.y = i * 1.2 + 0.8;
            ring.rotation.x = Math.PI / 2;

        function createNoiseTexture(colorHex, intensity=0.1) {
            const cvs = document.createElement('canvas'); cvs.width = 256; cvs.height = 256;
            const ctx = cvs.getContext('2d');
            ctx.fillStyle = colorHex; ctx.fillRect(0,0,256,256);
            for(let i=0; i<15000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? `rgba(0,0,0,${intensity})` : `rgba(255,255,255,${intensity})`;
                ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2);
            }
            const tex = new THREE.CanvasTexture(cvs);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function applyBeeCustomization() {
            if(state.stage !== 'adult') return; // Only color adults

            stripeCtx.fillStyle = state.color; 
            stripeCtx.fillRect(0, 0, 512, 512);
            for(let i=0; i<15000; i++) { 
                stripeCtx.fillStyle = Math.random()>0.5 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
                stripeCtx.fillRect(Math.random()*512, Math.random()*512, 2, 2);
            }
            stripeCtx.fillStyle = '#1A1108'; 
            stripeCtx.shadowColor = '#1A1108';
            stripeCtx.shadowBlur = 20; 
            stripeCtx.fillRect(0, 80, 512, 60);
            stripeCtx.fillRect(0, 200, 512, 60);
            stripeCtx.fillRect(0, 320, 512, 60);
            stripeCtx.fillRect(0, 440, 512, 60);
            stripeTex.needsUpdate = true;

            if (currentAccessoryMesh) { accessories.remove(currentAccessoryMesh); currentAccessoryMesh = null; }

            const acc = document.getElementById('sel-accessory').value;
            if (acc === 'tophat') {
                const hat = new THREE.Group();
                const brim = new THREE.Mesh(new THREE.CylinderGeometry(1.0, 1.0, 0.1, 32), headMat);
                const top = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 1.2, 32), headMat);
                top.position.y = 0.6; hat.add(brim, top);
                hat.position.set(0, 0.9, 0); hat.rotation.x = -0.1;
                currentAccessoryMesh = hat; accessories.add(hat);
            } 
            else if (acc === 'crown') {
                const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.5, 0.6, 8, 1, true), new THREE.MeshStandardMaterial({color: 0xfbbf24, metalness: 0.9, roughness: 0.1, side: THREE.DoubleSide}));
                const pos = crown.geometry.attributes.position;
                for(let i=0; i<pos.count; i++) { if(pos.getY(i) > 0 && i % 2 === 0) pos.setY(i, 0.8); }
                crown.geometry.computeVertexNormals();
                crown.position.set(0, 0.9, 0); crown.rotation.x = -0.1;
                currentAccessoryMesh = crown; accessories.add(crown);
            }
            else if (acc === 'flowercrown') {
                const fc = new THREE.Group();
                const colors = [0xff69b4, 0x4ade80, 0xfacc15, 0xa78bfa, 0x60a5fa];
                for(let i=0; i<9; i++) {
                    const fl = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshStandardMaterial({color: colors[i%colors.length], roughness: 0.5}));
                    const angle = (i/9)*Math.PI*2;

                    fc.add(fl);

        function renderSeeds() {
            // Remove old meshes
            activeSeedMeshes.forEach(mesh => { scene.remove(mesh); items = items.filter(i => i.mesh !== mesh); });
            activeSeedMeshes = [];

            const bloomTime = 2 * 60 * 60 * 1000; // 2 HOURS

            state.seeds.forEach(seedData => {
                const timeElapsed = Date.now() - seedData.plantedAt;
                const seedPos = new THREE.Vector3(seedData.position.x, 0, seedData.position.z);
                let currentMesh;

                if (timeElapsed >= bloomTime || seedData.bloomed) {
                    seedData.bloomed = true;
                    currentMesh = new THREE.Group();
                    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 6.0), new THREE.MeshStandardMaterial({color: 0x10b981}));
                    stem.position.y = 3.0; currentMesh.add(stem);
                    const bloom = new THREE.Group(); bloom.position.y = 6.0;
                    const center = new THREE.Mesh(new THREE.SphereGeometry(2.0, 16, 16), new THREE.MeshStandardMaterial({color: 0xffea00, emissive: 0xaa8800}));
                    bloom.add(center);
                    for(let i=0; i<12; i++) {
                        const petal = new THREE.Mesh(new THREE.SphereGeometry(1.0, 16, 16), new THREE.MeshPhysicalMaterial({color: 0xc084fc, transmission: 0.9, opacity: 0.8, transparent: true}));
                        petal.scale.set(1, 0.2, 3.5);
                        const angle = (i / 12) * Math.PI * 2;
                        petal.position.set(Math.cos(angle)*1.5, 0, Math.sin(angle)*1.5);
                        petal.rotation.y = -angle; bloom.add(petal);
                    }
                    currentMesh.add(bloom);
                    currentMesh.position.copy(seedPos);
                    scene.add(currentMesh);
                    items.push({ mesh: currentMesh, scaleTarget: 1.0, type: 'crystal', seedId: seedData.id });
                } else {
                    currentMesh = new THREE.Group();
                    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.0), new THREE.MeshStandardMaterial({color: 0x10b981}));
                    stem.position.y = 0.5; currentMesh.add(stem);
                    const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({color: 0x10b981}));
                    leaf.scale.set(1, 0.2, 2); leaf.position.set(0.3, 1.0, 0); leaf.rotation.z = 0.5; currentMesh.add(leaf);
                    currentMesh.position.copy(seedPos);
                    scene.add(currentMesh);
                }
                activeSeedMeshes.push(currentMesh);
            });
            
            // Update UI timer visibility based on unbloomed seeds
            const unbloomed = state.seeds.filter(s => !s.bloomed);
            if (unbloomed.length > 0) {
                document.getElementById('seed-timer').classList.remove('hidden');
                document.getElementById('seed-timer').innerText = `${unbloomed.length} seed(s) growing...`;
            } else {
                document.getElementById('seed-timer').classList.add('hidden');
            }
        }
        setInterval(renderSeeds, 60000); 

        // Treat Button logic
        document.getElementById('btn-treat').addEventListener('click', () => {
            if (state.stage === 'egg') {
                logUI("🥚 The egg doesn't need to eat right now.");
                return;
            }
            if (state.isSleeping) return;

            const treatPos = new THREE.Vector3((Math.random() - 0.5) * 10, 0, 10);
            
            if (state.stage === 'larva') {
                // Royal Jelly for Larvae
                const treat = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshStandardMaterial({color: 0xffffff, emissive: 0x555555, transparent: true, opacity: 0.9}));
                treat.scale.set(1, 0.5, 1);
                treat.position.copy(treatPos);
                scene.add(treat);
                items.push({ mesh: treat, scaleTarget: 1.0, type: 'jelly' });
                logUI("Dropped some nutritious Royal Jelly! 💧");
            } else {
                // Sugar Water for Adults
                const treat = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), new THREE.MeshStandardMaterial({color: 0x00aaff, transparent: true, opacity: 0.8, roughness: 0.1}));
                treat.scale.set(1, 1.5, 1); 
                treat.position.copy(treatPos);
                scene.add(treat);
                items.push({ mesh: treat, scaleTarget: 1.0, type: 'treat' });
                logUI("Dropped a Sugar Water treat! 💧");
            }
        });

        let pointerDownPos = {x:0, y:0};
        window.addEventListener('pointerdown', (e) => {
            pointerDownPos.x = e.clientX || (e.touches && e.touches[0].clientX);
            pointerDownPos.y = e.clientY || (e.touches && e.touches[0].clientY);
        }, {passive: true});

        window.addEventListener('pointerup', (e) => {
            if (e.target.closest('.glass') || ['SELECT', 'INPUT', 'BUTTON'].includes(e.target.tagName)) return;
            const x = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
            const y = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
            if (x === undefined || y === undefined) return;
            if (Math.hypot(x - pointerDownPos.x, y - pointerDownPos.y) > 30) return; 
            
            mouse.x = (x / window.innerWidth) * 2 - 1; mouse.y = -(y / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            // Seed Planting Mode
            if (isPlantingSeed) {
                const intersectPoint = new THREE.Vector3();
                raycaster.ray.intersectPlane(interactionPlane, intersectPoint);
                const newSeed = {
                    id: Date.now() + Math.random(),
                    plantedAt: Date.now(),
                    bloomed: false,
                    position: {x: intersectPoint.x, y: 0, z: intersectPoint.z}
                };
                state.seeds.push(newSeed);
                isPlantingSeed = false;
                document.body.classList.remove('cursor-plant');
                renderSeeds();
                return;
            }

            // 1. Did we tap the Box?
            const boxIntersects = raycaster.intersectObject(boxHitBox);
            if (boxIntersects.length > 0 && boxGroup.visible && !state.hiveUnlocked && state.stage === 'adult') {
                state.hiveUnlocked = true;
                hiveGroup.visible = true;
                boxGroup.visible = false;
                logUI("📦 You unpacked the Hive! Honey now has a home.");
                spawnFloatingEmoji('✨', boxGroup.position.clone().add(new THREE.Vector3(0,5,0)));
                return;
            }

            // 2. Did we tap the Hive?
            const hiveIntersects = raycaster.intersectObject(hiveHitBox);
            if (hiveIntersects.length > 0 && state.hiveUnlocked) {
                state.isSleeping = !state.isSleeping;
                if (state.isSleeping) {
                    targetPosition.set(0, 2, -17); 
                    logUI("Honey is heading to the hive for a nap! 🌙");
                } else {
                    targetPosition.set(0, 0, 0);
                    logUI("Honey is awake and ready to play! ☀️");
                    beeMaster.visible = true; 
                }
                return;
            }
            
            // 3. Did we tap Honey?
            if (!state.isSleeping && beeMaster.visible) {
                const beeIntersects = raycaster.intersectObject(beeHitBox);
                if (beeIntersects.length > 0) {
                    totalPets++;
                    state.stats.happiness = Math.min(100, state.stats.happiness + 20);
                    updateStatsUI();
                    
                    if (totalPets % 5 === 0 && state.stage === 'adult') {
                        isDoingWaggle = true; waggleTimer = 0;
                        logUI("Honey is doing a joyful backflip! 🤸‍♀️🎵");
                        spawnFloatingEmoji('✨', beeMaster.position.clone().add(new THREE.Vector3(0, 3, 0)));
                    } else {
                        logUI("Honey loves being petted! ❤️");
                        spawnFloatingEmoji('❤️', beeMaster.position.clone().add(new THREE.Vector3(0, 3, 0)));
                        isBeingPetted = true; petTimer = 2.0; 
                        beeVelocity.set(0,0,0);
                    }
                    return; 
                }
            }

            // 4. Drop a flower (Only adults care, but decorative for larvae)
            if (state.isSleeping) return;
            
            const intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(interactionPlane, intersectPoint);
            
            const isGolden = Math.random() < 0.10; 
            const flowerTypes = ['daisy', 'sunflower', 'tulip', 'bluebell'];
            const type = flowerTypes[Math.floor(Math.random() * flowerTypes.length)];
            
            const flower = new THREE.Group();
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.0), new THREE.MeshStandardMaterial({color: 0x4ade80}));
            stem.position.y = 0.5; flower.add(stem);
            const bloom = new THREE.Group(); bloom.position.y = 1.0;
            
            if (isGolden) {
                const glowMat = new THREE.MeshStandardMaterial({color: 0xffea00, emissive: 0xffaa00, roughness: 0.1});
                bloom.add(new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), glowMat));
                for(let i=0; i<12; i++) {
                    const petal = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), glowMat);
                    petal.scale.set(1, 0.2, 2.0);
                    const angle = (i / 12) * Math.PI * 2;
                    petal.position.set(Math.cos(angle)*0.5, 0, Math.sin(angle)*0.5);
                    petal.rotation.y = -angle; bloom.add(petal);
                }
            }
            else if (type === 'daisy') {
                bloom.add(new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), new THREE.MeshStandardMaterial({color: 0xfacc15, roughness: 0.9})));
                const petalMat = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.3});
                for(let i=0; i<8; i++) {
                    const petal = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), petalMat);
                    petal.scale.set(1, 0.2, 1.5);
                    const angle = (i / 8) * Math.PI * 2;
                    petal.position.set(Math.cos(angle)*0.4, 0, Math.sin(angle)*0.4);
                    petal.rotation.y = -angle; bloom.add(petal);
                }
            } else if (type === 'sunflower') {
                const center = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.1, 16), new THREE.MeshStandardMaterial({color: 0x3e2723, roughness: 1.0}));
                center.rotation.x = Math.PI / 2; bloom.add(center);
                const petalMat = new THREE.MeshStandardMaterial({color: 0xffd54f, roughness: 0.4});
                for(let i=0; i<12; i++) {
                    const petal = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), petalMat);
                    petal.scale.set(1, 0.1, 2.0);
                    const angle = (i / 12) * Math.PI * 2;
                    petal.position.set(Math.cos(angle)*0.6, 0, Math.sin(angle)*0.6);
                    petal.rotation.y = -angle; bloom.add(petal);
                }
            } else if (type === 'tulip') {
                const petalMat = new THREE.MeshStandardMaterial({color: 0xe91e63, roughness: 0.3, side: THREE.DoubleSide});
                for(let i=0; i<5; i++) {
                    const petal = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), petalMat);
                    petal.scale.set(1, 1.5, 0.2);
                    const angle = (i / 5) * Math.PI * 2;
                    petal.position.set(Math.cos(angle)*0.15, 0.3, Math.sin(angle)*0.15);
                    petal.rotation.y = -angle; petal.rotation.x = 0.2; bloom.add(petal);
                }
            } else { 
                const bell = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.4, 0.8, 16, 1, true), new THREE.MeshStandardMaterial({color: 0x5c6bc0, roughness: 0.3, side: THREE.DoubleSide}));
                bell.position.y = 0.2; bloom.add(bell);
            }
            bloom.rotation.x = 0.2 + Math.random()*0.2; 
            flower.add(bloom); flower.position.copy(intersectPoint); flower.scale.set(0.1, 0.1, 0.1); 
            
            scene.add(flower); 
            items.push({ mesh: flower, scaleTarget: 1.0 + Math.random()*0.5, type: isGolden ? 'golden' : 'flower' });
            
            logUI(isGolden ? "🌟 A rare Golden Flower bloomed!" : `Planted a beautiful ${type}! 🌸`);
        });


        const clock = new THREE.Clock();
        let beeVelocity = new THREE.Vector3();
        let statDecayTimer = 0;
        let autoTimer = 0;
        let lastSleepPrompt = 0;
        let zzzTimer = 0; 
        const targetRotationObj = new THREE.Object3D(); 

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1); 
            const time = clock.getElapsedTime();

            // Rain Particles
            if (isRaining) {
                if (Math.random() < 0.5) {
                    const drop = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5), new THREE.MeshBasicMaterial({color: 0x93c5fd, transparent: true, opacity: 0.6}));
                    drop.position.set((Math.random()-0.5)*100, 40, (Math.random()-0.5)*100);
                    scene.add(drop);
                    rainParticles.push(drop);
                }
                // Auto-return to hive if raining and adult!
                if (!state.isSleeping && state.stage === 'adult' && state.hiveUnlocked) {
                    targetPosition.copy(hiveDoorTarget);
                    if (beeMaster.position.distanceTo(hiveDoorTarget) < 1.0) state.isSleeping = true;
                }
            }
            for(let i = rainParticles.length - 1; i >= 0; i--) {
                rainParticles[i].position.y -= 40 * dt;
                if (rainParticles[i].position.y < 0) { scene.remove(rainParticles[i]); rainParticles.splice(i, 1); }
            }

            // Stat Management
            statDecayTimer += dt;
            if(statDecayTimer > 1.0) {
                statDecayTimer = 0;
                if (state.stage !== 'egg') {
                    if (state.isSleeping) {
                        state.stats.energy += 5.0; 
                        state.stats.hunger -= 0.2; 
                        state.stats.tiredness -= 5.0; 
                        
                        if (state.stage === 'adult' && state.stats.nectar >= 1) {
                            state.stats.nectar -= 1; 
                            state.stats.honeyJars += 0.2; 
                            if (Math.abs(state.stats.honeyJars % 1) < 0.19) spawnFloatingEmoji('🍯', hiveDoorTarget);
                        }
                    } else {
                        // Awake stat decay
                        state.stats.energy -= 0.8; 
                        state.stats.hunger -= 1.5; 
                        state.stats.tiredness += 1.2; 
                        if (state.stats.hunger < 30 || state.stats.energy < 20) state.stats.happiness -= 2.0;
                        else if (state.stats.happiness < 100) state.stats.happiness += 0.5;
                        
                        if (state.stats.tiredness > 75 && time - lastSleepPrompt > 20) {
                            logUI("Honey is getting very tired. 🥱 Tap the hive for bedtime?");
                            lastSleepPrompt = time;
                        }
                    }
                    updateStatsUI();
                    
                    // AUTONOMOUS HIVE RETURN if full of nectar
                    if (!state.isSleeping && state.stage === 'adult' && state.hiveUnlocked) {
                        if (state.stats.nectar >= 5) {
                            logUI("Honey's pollen baskets are full! Returning to hive.");
                            targetPosition.copy(hiveDoorTarget);
                            if (beeMaster.position.distanceTo(hiveDoorTarget) < 1.0) state.isSleeping = true;
                        }
                    }
                }
            }

            // Playful Zzz Emojis
            if (state.isSleeping && beeMaster.position.distanceTo(hiveDoorTarget) < 2.0) {
                zzzTimer += dt;
                if (zzzTimer > 1.0) { 
                    const zTexts = ['Z', 'Zz', 'zZz', 'ZZzz', 'z', 'Zzz'];
                    const sizes = ['20px', '28px', '36px', '24px'];
                    spawnFloatingEmoji(zTexts[Math.floor(Math.random() * zTexts.length)], hiveDoorTarget, sizes[Math.floor(Math.random() * sizes.length)]);
                    zzzTimer = 0;
                }
            }

            // Rainbow Trail (Always on when flying fast)
            if (!state.isSleeping && state.stage === 'adult' && beeVelocity.length() > 0.5) {
                if (Math.random() > 0.4) {
                    const color = new THREE.Color().setHSL((time * 0.5) % 1, 1, 0.6); 
                    const p = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshBasicMaterial({color: color, transparent: true, opacity: 0.8}));
                    p.position.copy(beeMaster.position); p.position.y -= 0.5; 
                    scene.add(p); trailParticles.push({mesh: p, life: 1.0});
                }
            }
            for(let i = trailParticles.length - 1; i >= 0; i--) {
                let p = trailParticles[i];
                p.life = Math.max(0, p.life - dt * 1.5); 
                if (p.life <= 0) { scene.remove(p.mesh); trailParticles.splice(i, 1); } 
                else { p.mesh.scale.setScalar(p.life); }
            }

            // Animate Friends
            if (state.friendsUnlocked.butterfly && butterflyGroup.visible) {
                butterflyGroup.position.x = 5 + Math.sin(time * 0.8) * 6;
                butterflyGroup.position.z = -12 + Math.cos(time * 0.6) * 5;
                butterflyGroup.position.y = 3 + Math.sin(time * 2.5) * 1.5;
                butterflyGroup.children[0].rotation.y = Math.sin(time * 20) * 0.8; 
                butterflyGroup.children[1].rotation.y = Math.PI - Math.sin(time * 20) * 0.8;
                butterflyGroup.rotation.y = Math.atan2(Math.cos(time * 0.6), -Math.sin(time * 0.8));
            }
            if (state.friendsUnlocked.ladybug && ladybugGroup.visible) {
                ladybugGroup.position.x = Math.sin(time * 0.3) * 6;
                ladybugGroup.position.z = -20 + Math.cos(time * 0.3) * 6;
                ladybugGroup.rotation.y = -time * 0.3 + Math.PI; 
            }
            if (state.friendsUnlocked.grasshopper && grasshopperGroup.visible) {
                grasshopperGroup.position.y = Math.abs(Math.sin(time * 2)) > 0.9 ? 1.5 : 0.5;
                grasshopperGroup.position.x = -6 + Math.sin(time * 0.5) * 2;
            }
            if (state.friendsUnlocked.firefly && fireflyGroup.visible) {
                fireflyGroup.position.x = -5 + Math.sin(time * 1.2) * 5;
                fireflyGroup.position.z = -10 + Math.cos(time * 0.8) * 4;
                fireflyGroup.position.y = 4 + Math.sin(time * 3) * 1.5;
                fireflyGroup.children[1].material.emissiveIntensity = isNightTime ? (0.5 + Math.sin(time * 5) * 0.5) : 0;
            }
            
            // Animate Child Bees
            childBees.forEach((child, i) => {
                const angle = time + (i * Math.PI/2);
                child.position.x = beeMaster.position.x + Math.cos(angle)*3;
                child.position.z = beeMaster.position.z + Math.sin(angle)*3;
                child.position.y = beeMaster.position.y - 1;
            });

            // Timers
            if (isBeingPetted) { petTimer -= dt; if (petTimer <= 0) isBeingPetted = false; }
            if (isDoingWaggle) {
                waggleTimer += dt;
                if (waggleTimer > 2.5) { isDoingWaggle = false; beeMaster.rotation.set(0,0,0); }
            }

            items.forEach(item => {
                if (item.mesh.scale.x < item.scaleTarget) item.mesh.scale.lerp(new THREE.Vector3(item.scaleTarget, item.scaleTarget, item.scaleTarget), 0.1);
            });

            // Auto Wander Logic 
            if (!state.isSleeping && !isBeingPetted && !isDoingWaggle && state.stats.nectar < 5 && !isRaining) {
                autoTimer -= dt;
                if (autoTimer <= 0) {
                    if (items.length > 0) {
                        // Prioritize food based on stage
                        let priorityItem;
                        if (state.stage === 'larva') {
                            priorityItem = items.find(i => i.type === 'jelly') || items[0];
                        } else {
                            priorityItem = items.find(i => i.type === 'crystal') || items.find(i => i.type === 'treat') || items.find(i => i.type === 'golden') || items[0];
                        }
                        targetPosition.copy(priorityItem.mesh.position); 
                        autoTimer = 3.0;
                    } else {
                        targetPosition.set((Math.random() - 0.5) * 40, 0, (Math.random() - 0.5) * 40);
                        autoTimer = 2.0 + Math.random() * 3.0;
                    }
                }
            }

            // Physics & Movement
            const direction = new THREE.Vector3().subVectors(targetPosition, beeMaster.position);
            
            // Larva/Egg stay on ground, adults fly
            if (state.stage === 'larva' || state.stage === 'egg') direction.y = 0;
            else if (!state.isSleeping) direction.y = 0; 
            
            const distance = direction.length();
            let maxSpeed = state.isSleeping ? 10.0 : 15.0; 
            if (state.stage === 'larva') maxSpeed = 3.0; // Larvae are slow!
            if (state.stage === 'egg') maxSpeed = 0.0;
            
            // Behavioral slow down based on stats
            const speedMultiplier = (state.stats.energy/100) * (state.stats.hunger/100);
            const activeSpeed = Math.max(maxSpeed * 0.2, maxSpeed * speedMultiplier);

            if (distance > 0.5 && !isBeingPetted && !isDoingWaggle) {
                direction.normalize();
                beeVelocity.lerp(direction.multiplyScalar(activeSpeed), 0.1);
            } else {
                beeVelocity.lerp(new THREE.Vector3(0,0,0), 0.2); 
            }
            beeMaster.position.addScaledVector(beeVelocity, dt);
            const currentSpeed = beeVelocity.length();

            // Rotations & Visibility
            if (state.isSleeping && distance < 0.5) {
                beeMaster.visible = false; 
            } else {
                beeMaster.visible = true;

                if (isDoingWaggle) {
                    beeMaster.rotation.y = Math.sin(time * 25) * 0.4; 
                    beeMaster.position.x += Math.sin(time * 5) * 0.05;
                    beeMaster.position.z += Math.cos(time * 10) * 0.05;
                } 
                else if (isBeingPetted) {
                    targetRotationObj.position.copy(beeMaster.position);
                    const euler = new THREE.Euler().setFromQuaternion(beeMaster.quaternion);
                    targetRotationObj.rotation.set(0, euler.y + Math.sin(time * 20) * 0.1, 0); 
                    beeMaster.quaternion.slerp(targetRotationObj.quaternion, 0.3);
                } 
                else if (currentSpeed > 0.1 && state.stage === 'adult') {
                    const lookPos = beeMaster.position.clone().add(beeVelocity);
                    targetRotationObj.position.copy(beeMaster.position);
                    targetRotationObj.lookAt(lookPos);
                    
                    // Dynamic Droop! If sad/tired, droop head down.
                    const tilt = speedMultiplier < 0.3 ? -0.3 : 0.2; 
                    targetRotationObj.rotateX(tilt); 
                    beeMaster.quaternion.slerp(targetRotationObj.quaternion, 0.15);
                } 
                else if (state.stage === 'adult') {
                    targetRotationObj.position.copy(beeMaster.position);
                    const euler = new THREE.Euler().setFromQuaternion(beeMaster.quaternion);
                    targetRotationObj.rotation.set(0, euler.y, 0); 
                    beeMaster.quaternion.slerp(targetRotationObj.quaternion, 0.1);
                }
            }

            // Stage-specific Animations
            if (state.stage === 'adult' && !state.isSleeping) {
                if (!isDoingWaggle) beeGroup.position.y = 5.0 + Math.sin(time * 3) * 0.5;
                
                // Slow flapping if tired/sad
                let flapSpeed = currentSpeed > 1 || isDoingWaggle ? 100 : 60; 
                if (speedMultiplier < 0.3) flapSpeed = 20; 

                wingPivots.forEach(w => w.pivot.rotation.z = (Math.sin(time * flapSpeed) * 0.8) * w.sign);

                const targetLegTuck = (currentSpeed > 3 && !isBeingPetted && !isDoingWaggle) ? -0.4 : 0.1;
                legs.forEach((leg, index) => {
                    leg.rotation.x += (targetLegTuck - leg.rotation.x) * 0.1;
                    leg.rotation.z += Math.sin(time * 5 + index) * 0.005; 
                });

                // DYNAMIC POLLEN BASKETS!
                const targetPollenSize = Math.max(0.001, Math.min(1.5, state.stats.nectar * 0.2));
                pollenBaskets.forEach(basket => {
                    basket.visible = state.stats.nectar > 0; 
                    basket.scale.lerp(new THREE.Vector3(targetPollenSize, targetPollenSize, targetPollenSize), 0.1);
                });
            } else if (state.stage === 'larva') {
                beeGroup.position.y = 0.5 + Math.abs(Math.sin(time * 5)) * 0.2; // Wriggle
            }

            // Collision (Eating items)
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                const dx = beeMaster.position.x - item.mesh.position.x;
                const dz = beeMaster.position.z - item.mesh.position.z;
                const dist2D = Math.hypot(dx, dz);
                
                if (dist2D < 5.0 * state.size && !state.isSleeping && !isBeingPetted && !isDoingWaggle) { 
                    scene.remove(item.mesh);
                    items.splice(i, 1);
                    
                    if (item.type === 'jelly' && state.stage === 'larva') {
                        state.totalFood += 1;
                        state.stats.hunger = Math.min(100, state.stats.hunger + 50);
                        state.stats.energy = Math.min(100, state.stats.energy + 20);
                        logUI("The larva ate nutritious Royal Jelly! 🐛");
                    }
                    else if (item.type === 'treat') {
                        state.stats.hunger = Math.min(100, state.stats.hunger + 50);
                        state.stats.energy = Math.min(100, state.stats.energy + 50);
                        state.stats.happiness = Math.min(100, state.stats.happiness + 20);
                        logUI("Honey guzzled the sugar water! ⚡");
                        spawnFloatingEmoji('⚡', beeMaster.position.clone().add(new THREE.Vector3(0, 3, 0)));
                    } else if (state.stage === 'adult') {
                        // Real Food!
                        state.totalFood += 1;
                        state.stats.hunger = Math.min(100, state.stats.hunger + 30);
                        state.stats.energy = Math.min(100, state.stats.energy + 10);
                        state.stats.happiness = Math.min(100, state.stats.happiness + 5);
                        
                        if (item.type === 'golden') {
                            state.stats.nectar += 5; 
                            logUI("WOW! Honey found a Golden Flower and is doing the Waggle Dance! 🌟");
                            spawnFloatingEmoji('🌟', beeMaster.position.clone().add(new THREE.Vector3(0, 3, 0)));
                            isDoingWaggle = true; waggleTimer = 0; 
                        } else if (item.type === 'crystal') {
                            state.stats.nectar += 15; 
                            // Free up a seed slot!
                            state.seeds = state.seeds.filter(s => s.id !== item.seedId); 
                            logUI("AMAZING! Honey ate the Crystal Bloom and is doing the Waggle Dance! 💎");
                            spawnFloatingEmoji('💎', beeMaster.position.clone().add(new THREE.Vector3(0, 3, 0)));
                            isDoingWaggle = true; waggleTimer = 0; 
                        } else {
                            state.stats.nectar += 1; 
                            logUI("Honey gathered nectar! 🌸");
                        }
                    }
                    
                    updateStatsUI();
                    if (!isDoingWaggle && state.stage === 'adult') beeMaster.rotateY(Math.PI * 2); 
                }
            }

            updateAudioBuzz(currentSpeed / maxSpeed);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize!
        isSceneReady = true;
        rebuildBeeMesh();
        applyLoadedData(state);
        renderSeeds();
        
        setTimeout(animate, 100);

    </script>
</body>
</html>
