<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honey the Virtual Bee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #a7f3d0 0%, #ecfdf5 100%);
            transition: background 2s ease; 
            user-select: none;
            -webkit-user-select: none;
        }
        body.raining { background: linear-gradient(135deg, #64748b 0%, #94a3b8 100%) !important; }
        body.night-mode { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%) !important; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; touch-action: none; }
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            transition: background 2s ease, border 2s ease;
        }
        body.night-mode .glass, body.raining .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); color: #f1f5f9; }
        body.night-mode .text-slate-600, body.raining .text-slate-600 { color: #cbd5e1; }
        body.night-mode h1, body.raining h1 { color: #fcd34d; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 4px; }
        @keyframes floatUpAndFade { 0% { transform: translateY(0) scale(0.8); opacity: 0; } 20% { opacity: 1; transform: translateY(-10px) scale(1.2); } 100% { transform: translateY(-60px) scale(1.5); opacity: 0; } }
        .floating-emoji { position: absolute; pointer-events: none; animation: floatUpAndFade 2s ease-out forwards; z-index: 100; font-weight: 800; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); transform: translate(-50%, -50%); color: #334155; }
        body.night-mode .floating-emoji, body.raining .floating-emoji { color: #f8fafc; }
        .cursor-plant { cursor: crosshair !important; }
        .btn-locked { opacity: 0.5 !important; pointer-events: none !important; transform: scale(0.98) !important; filter: grayscale(50%); }
    </style>
</head>
<body class="w-screen h-screen relative text-slate-800" id="main-body">
    <div id="canvas-container"></div>
    <div class="absolute top-4 left-4 right-4 flex justify-between items-start z-50 pointer-events-none">
        <button id="btn-toggle-menu" class="pointer-events-auto glass px-4 py-2 rounded-full font-bold text-amber-700 shadow-md text-sm flex items-center gap-2 active:scale-95 transition">📊 Stats & Menu</button>
        <button id="toggle-audio" class="pointer-events-auto p-2 rounded-full bg-white/50 hover:bg-white/80 transition-colors shadow-sm text-lg active:scale-95" title="Toggle Buzz Sound">🔇</button>
    </div>

    <!-- EGG TIMER NOTIFICATION -->
    <div id="egg-timer" class="absolute top-20 left-1/2 -translate-x-1/2 text-center text-sm font-bold text-purple-700 bg-white/90 px-4 py-1.5 rounded-full shadow-md z-40 pointer-events-none hidden transition-opacity border-2 border-purple-200"></div>

    <div id="dashboard-panel" class="absolute top-16 left-4 right-4 md:left-auto md:right-4 md:w-80 flex flex-col gap-3 z-40 pointer-events-none max-h-[75vh] overflow-y-auto custom-scroll pb-2 transition-opacity hidden">
        <div class="glass rounded-2xl p-4 shadow-lg pointer-events-auto">
            
            <div class="flex justify-between items-center mb-1">
                <h1 class="text-xl font-bold text-amber-700 flex items-center gap-1">
                    🐝 <input type="text" id="inp-bee-name" value="Honey" class="bg-transparent border-b border-amber-300 w-28 outline-none font-bold text-amber-700 placeholder-amber-400 text-center" /> <span class="text-sm cursor-pointer" title="Edit Name">✏️</span>
                </h1>
            </div>
            
            <div class="flex justify-between items-center mb-3 pb-2 border-b border-black/10 text-xs">
                <span class="font-semibold text-slate-600 flex flex-col">
                    <span id="sync-status" class="text-emerald-600">☁️ Cloud Sync Active</span>
                    <span class="mt-1">Hatched: <span id="val-dob" class="font-bold text-amber-600"></span></span>
                </span>
                <span id="life-stage" class="font-bold text-purple-600 px-2 py-1 bg-purple-100 rounded self-start">Stage: Egg</span>
            </div>
            
            <div class="space-y-3">
                <div>
                    <div class="flex justify-between text-xs font-bold mb-1 uppercase tracking-wide text-slate-600"><span>Health</span><span id="val-health">100%</span></div>
                    <div class="h-2.5 w-full bg-black/10 rounded-full overflow-hidden shadow-inner"><div id="bar-health" class="h-full bg-red-500 rounded-full transition-all duration-300 w-full"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-xs font-bold mb-1 uppercase tracking-wide text-slate-600"><span>Energy</span><span id="val-energy">100%</span></div>
                    <div class="h-2.5 w-full bg-black/10 rounded-full overflow-hidden shadow-inner"><div id="bar-energy" class="h-full bg-amber-400 rounded-full transition-all duration-300 w-full"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-xs font-bold mb-1 uppercase tracking-wide text-slate-600"><span>Hunger</span><span id="val-hunger">100%</span></div>
                    <div class="h-2.5 w-full bg-black/10 rounded-full overflow-hidden shadow-inner"><div id="bar-hunger" class="h-full bg-green-400 rounded-full transition-all duration-300 w-full"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-xs font-bold mb-1 uppercase tracking-wide text-slate-600"><span>Happiness</span><span id="val-happiness">100%</span></div>
                    <div class="h-2.5 w-full bg-black/10 rounded-full overflow-hidden shadow-inner"><div id="bar-happiness" class="h-full bg-pink-400 rounded-full transition-all duration-300 w-full"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-xs font-bold mb-1 uppercase tracking-wide text-slate-600"><span>Tiredness</span><span id="val-tiredness">0%</span></div>
                    <div class="h-2.5 w-full bg-black/10 rounded-full overflow-hidden shadow-inner"><div id="bar-tiredness" class="h-full bg-blue-400 rounded-full transition-all duration-300 w-0"></div></div>
                </div>
                <div class="pt-2 border-t border-black/10 flex justify-between items-center">
                    <div class="flex flex-col"><span class="text-xs font-bold uppercase tracking-wide text-slate-600">Nectar Gathered</span><span id="val-nectar" class="font-bold text-amber-500">0 drops</span></div>
                    <div class="flex flex-col text-right"><span class="text-xs font-bold uppercase tracking-wide text-slate-600">Honey Made</span><span id="val-honey" class="font-bold text-amber-500 text-lg">0.00 🍯</span></div>
                </div>
            </div>
        </div>

        <div class="glass rounded-2xl p-4 text-sm shadow-lg pointer-events-auto">
            <div class="space-y-3">
                
                <div id="wrap-fuzz-color" class="flex justify-between items-center hidden">
                    <span class="font-semibold text-slate-600">Fuzz Color:</span>
                    <input type="color" id="inp-color" value="#E6A122" class="w-8 h-8 rounded cursor-pointer border-0 p-0 bg-transparent">
                </div>
                
                <div id="wrap-egg-color" class="flex justify-between items-center">
                    <span class="font-semibold text-slate-600">Egg Color:</span>
                    <select id="sel-egg-color" class="bg-white/50 border border-black/10 rounded px-2 py-1 outline-none">
                        <option value="#ffd700" class="text-black">Gold</option>
                        <option value="#facc15" class="text-black">Yellow</option>
                        <option value="#ff69b4" class="text-black">Pink</option>
                        <option value="#60a5fa" class="text-black">Blue</option>
                        <option value="#f97316" class="text-black">Orange</option>
                        <option value="#ef4444" class="text-black">Red</option>
                        <option value="#a855f7" class="text-black">Purple</option>
                    </select>
                </div>
                
                <div class="flex justify-between items-center">
                    <span class="font-semibold text-slate-600">Accessory:</span>
                    <select id="sel-accessory" class="bg-white/50 border border-black/10 rounded px-2 py-1 outline-none">
                        <option value="none" class="text-black">None</option>
                        <option value="tophat" class="text-black">Top Hat</option>
                        <option value="crown" class="text-black">Gold Crown</option>
                        <option value="flowercrown" class="text-black">Flower Crown</option>
                        <option value="bowtie" class="text-black">Red Bow Tie</option>
                    </select>
                </div>
                <div class="pt-2 border-t border-black/10 text-center">
                    <button id="btn-reset" class="text-xs bg-red-100 hover:bg-red-200 text-red-600 px-3 py-1.5 rounded shadow-sm transition">Reset All Game Data</button>
                </div>
            </div>
        </div>

        <div class="glass rounded-2xl p-3 h-28 flex flex-col shadow-lg pointer-events-auto">
            <h2 class="font-bold text-slate-700 text-xs mb-1 uppercase tracking-wide">Diary</h2>
            <div id="log-container" class="flex-1 overflow-y-auto custom-scroll text-xs text-slate-700 space-y-2 pr-2 flex flex-col"></div>
        </div>
    </div>

    <div id="seed-timer" class="absolute bottom-24 left-0 w-full text-center text-sm font-bold text-emerald-800 drop-shadow-md hidden z-40 pointer-events-none bg-white/50 py-1"></div>

    <div class="absolute bottom-6 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:w-96 flex gap-3 z-40 pointer-events-auto">
        <!-- Buttons are strictly locked by default to prevent early clicks while loading -->
        <button id="btn-treat" class="flex-1 py-3 rounded-2xl bg-pink-500 text-white font-bold shadow-lg transition-all duration-300 text-sm border-2 border-white/20 btn-locked">💧 Food (Waiting)</button>
        <button id="btn-seed" class="flex-1 py-3 rounded-2xl bg-emerald-500 text-white font-bold shadow-lg transition-all duration-300 text-sm border-2 border-white/20 btn-locked">🌱 Plant Seed</button>
    </div>

    <script type="module">
        const menuBtn = document.getElementById('btn-toggle-menu');
        const dashboard = document.getElementById('dashboard-panel');
        let menuOpen = false; 
        if (!menuOpen) dashboard.classList.add('hidden');
        menuBtn.addEventListener('click', () => {
            menuOpen = !menuOpen;
            if (menuOpen) { dashboard.classList.remove('hidden'); menuBtn.innerHTML = '❌ Close Menu'; } 
            else { dashboard.classList.add('hidden'); menuBtn.innerHTML = '📊 Stats & Menu'; }
        });

        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        
        let db, auth, currentUser;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        
        const state = {
            name: 'Honey',
            birthDate: Date.now(), 
            totalFood: 0,
            totalNectarGathered: 0,          
            stage: 'egg',          
            hiveUnlocked: false,
            hiveLevel: 1, 
            children: 0,           
            color: '#E6A122', 
            eggColor: '#ffd700', // Default Egg Color
            accessory: 'none',
            audioEnabled: false,
            isSleeping: false,
            stageStart: Date.now(),
            larvaFood: 0,
            childNectar: 0,
            hourly: { timestamp: Date.now(), count: 0 }, 
            friendsUnlocked: { butterfly: false, ladybug: false, caterpillar: false, dragonfly: false, firefly: false },
            seeds: [], 
            stats: { health: 100, energy: 100, hunger: 100, happiness: 100, tiredness: 0, nectar: 0, honeyJars: 0 } 
        };
        
        let isSceneReady = false;

        document.getElementById('inp-bee-name').addEventListener('change', (e) => {
            state.name = e.target.value;
            logUI(`Name officially changed to ${state.name}! ✨`);
        });

        function checkHourlyLimit() {
            if (Date.now() - state.hourly.timestamp >= 3600000) {
                state.hourly.timestamp = Date.now();
                state.hourly.count = 0;
            }
            if (state.hourly.count >= 5) {
                logUI(`⚠️ ${state.name} is too full/tired to eat right now! Please wait a little while.`);
                return false;
            }
            state.hourly.count++;
            return true;
        }
        
        function resetToEgg(reasonMessage) {
            state.stage = 'egg';
            state.birthDate = Date.now();
            state.stageStart = Date.now();
            state.totalFood = 0;
            state.totalNectarGathered = 0;
            state.larvaFood = 0;
            state.childNectar = 0;
            state.stats.health = 100;
            state.stats.hunger = 100;
            state.stats.energy = 100;
            state.stats.happiness = 100;
            state.stats.tiredness = 0;
            state.isSleeping = false; 
            if (beeMaster && beeMaster.userData) beeMaster.userData.isCracked = false;
            rebuildBeeMesh();
            if(reasonMessage) logUI(`💀 Oh no! ${reasonMessage}`);
        }

        function calculateStage() {
            const ageMs = Date.now() - state.birthDate;
            const hoursOld = ageMs / (1000 * 60 * 60);
            state.totalNectarGathered = state.totalNectarGathered || 0;
            
            let newStage = state.stage;
            
            // 1. Egg Stage
            if (state.stage === 'egg') {
                if (hoursOld >= 1.0) {
                    newStage = 'larva';
                    state.stageStart = Date.now();
                    state.larvaFood = 0;
                } else if (hoursOld >= 0.5 && typeof rebuildBeeMesh === 'function') {
                    if (beeMaster && beeMaster.userData && !beeMaster.userData.isCracked) {
                        beeMaster.userData.isCracked = true;
                        rebuildBeeMesh();
                        logUI(`The egg is starting to crack! Something is going to hatch soon...`);
                    }
                }
            } 
            // 2. Larva Stage
            else if (state.stage === 'larva') {
                const larvaHours = (Date.now() - state.stageStart) / 3600000;
                if (larvaHours >= 24) {
                    if (state.larvaFood < 30) {
                        resetToEgg(`${state.name} didn't get enough Royal Jelly (needs 30) in 24 hours and reverted to an egg to heal!`);
                        return;
                    } else {
                        newStage = 'child';
                        state.stageStart = Date.now();
                        state.childNectar = 0;
                    }
                }
            }
            // 3. Child Stage
            else if (state.stage === 'child') {
                const childHours = (Date.now() - state.stageStart) / 3600000;
                if (childHours >= 24 && state.childNectar < 20) {
                    resetToEgg(`${state.name} didn't gather enough nectar (needs 20) in her first 24 hours and reverted to an egg to heal!`);
                    return;
                }
                if (state.childNectar >= 60) {
                    newStage = 'adult';
                    state.stageStart = Date.now();
                }
            }
            
            if (state.stage !== newStage) {
                state.stage = newStage;
                logUI(`🎉 ${state.name} has grown into a ${newStage}!`);
                if (typeof rebuildBeeMesh === 'function') rebuildBeeMesh();
                
                if ((newStage === 'child' || newStage === 'adult') && !state.hiveUnlocked && state.hiveLevel === 1) {
                    boxGroup.visible = true;
                    logUI("📦 A mysterious delivery box has appeared in the garden!");
                }
            }
            
            if (state.stage === 'adult' || state.stage === 'child') {
                if (state.stats.honeyJars >= 50 && state.hiveLevel === 1 && state.hiveUnlocked) {
                    state.hiveLevel = 2; state.hiveUnlocked = false; 
                    boxGroup.visible = true; hiveGroup.visible = false;
                    logUI("📦 Another mysterious box appeared! What could it be?!");
                }
                if (state.stats.honeyJars >= 200 && state.hiveLevel === 2 && state.hiveUnlocked) {
                    state.hiveLevel = 3; state.hiveUnlocked = false; 
                    boxGroup.visible = true; hiveGroup.visible = false;
                    logUI("📦 A massive mysterious box appeared over the hive!");
                }
                if (state.stats.honeyJars >= 500 && state.hiveLevel === 3 && state.hiveUnlocked) {
                    state.hiveLevel = 4; state.hiveUnlocked = false; 
                    boxGroup.visible = true; hiveGroup.visible = false;
                    logUI("📦 An elegant, incredibly heavy box just dropped into the garden!");
                }
                if (state.stats.honeyJars >= 1000 && state.hiveLevel === 4 && state.hiveUnlocked) {
                    state.hiveLevel = 5; state.hiveUnlocked = false; 
                    boxGroup.visible = true; hiveGroup.visible = false;
                    logUI("📦 A glowing, magical crate has arrived. This must be the ultimate upgrade!");
                }
            }

            document.getElementById('life-stage').innerText = `Stage: ${state.stage.charAt(0).toUpperCase() + state.stage.slice(1)}`;
            document.getElementById('val-dob').innerText = new Date(state.birthDate).toLocaleDateString();
            
            const treatBtn = document.getElementById('btn-treat');
            const seedBtn = document.getElementById('btn-seed');
            
            // Toggle visibility of Egg Color vs Fuzz Color in the menu!
            if (state.stage === 'egg') {
                document.getElementById('wrap-egg-color').classList.remove('hidden');
                document.getElementById('wrap-fuzz-color').classList.add('hidden');
                treatBtn.innerText = "💧 Food (Waiting)"; 
                treatBtn.classList.add('btn-locked');
                seedBtn.classList.add('btn-locked');
            } else {
                document.getElementById('wrap-egg-color').classList.add('hidden');
                document.getElementById('wrap-fuzz-color').classList.remove('hidden');
                if (state.stage === 'larva') { 
                    treatBtn.innerText = "💧 Feed Royal Jelly"; 
                    treatBtn.classList.remove('btn-locked');
                    seedBtn.classList.add('btn-locked');
                } else if (state.stage === 'child' || state.stage === 'adult') { 
                    treatBtn.innerText = "💧 Sugar Water"; 
                    treatBtn.classList.remove('btn-locked');
                    seedBtn.classList.remove('btn-locked');
                }
            }
            
            if (state.stage === 'adult') {
                const expectedChildren = Math.min(10, Math.floor(state.stats.honeyJars / 1000));
                if (expectedChildren > state.children) {
                    state.children = expectedChildren;
                    logUI(`🥚 Incredible! ${state.name} laid a new baby egg! (${state.children}/10)`);
                    if (typeof updateChildrenMeshes === 'function') updateChildrenMeshes();
                }
            }
        }
        
        function applyLoadedData(data) {
            state.name = data.name || state.name;
            state.birthDate = data.birthDate || state.birthDate;
            state.totalFood = data.totalFood || state.totalFood;
            state.totalNectarGathered = data.totalNectarGathered || 0;
            state.stage = data.stage || 'egg'; 
            state.hiveUnlocked = data.hiveUnlocked || state.hiveUnlocked;
            state.hiveLevel = data.hiveLevel || state.hiveLevel;
            state.children = data.children || state.children;
            state.stats = data.stats || state.stats;
            if (state.stats.health === undefined) state.stats.health = 100;
            state.hourly = data.hourly || { timestamp: Date.now(), count: 0 };
            state.stageStart = data.stageStart || Date.now();
            state.larvaFood = data.larvaFood || 0;
            state.childNectar = data.childNectar || 0;
            
            state.color = data.color || state.color;
            state.eggColor = data.eggColor || '#ffd700'; // Load saved egg color!
            state.friendsUnlocked = data.friendsUnlocked || state.friendsUnlocked;
            state.seeds = data.seeds || [];
            
            if (data.lastSaved && state.stage !== 'egg') {
                const msOffline = Date.now() - new Date(data.lastSaved).getTime();
                const hoursOffline = msOffline / (1000 * 60 * 60);
                
                if (hoursOffline > 0.1) {
                    const startingHunger = data.stats && data.stats.hunger !== undefined ? data.stats.hunger : 100;
                    const hoursUntilStarving = startingHunger / 36.0;
                    
                    if (hoursOffline > hoursUntilStarving) {
                        state.stats.hunger = 0;
                        const starvingHours = hoursOffline - hoursUntilStarving;
                        state.stats.health -= (starvingHours * 18.0); // Health drains if starved
                    } else {
                        state.stats.hunger -= (hoursOffline * 36.0); // 36 per hour natural drain
                    }
                    
                    state.stats.energy = 100; 
                    
                    if (state.stats.health <= 0) {
                        resetToEgg(`${state.name} fainted from hunger while you were away and reverted to an egg to heal!`);
                    } else {
                        logUI(`Welcome back! ${state.name} missed you and is getting a little hungry.`);
                    }
                }
            }
            
            document.getElementById('inp-color').value = state.color;
            document.getElementById('sel-egg-color').value = state.eggColor;
            document.getElementById('sel-accessory').value = data.accessory || 'none';
            document.getElementById('inp-bee-name').value = state.name;
            
            if (!isSceneReady) return; 
            
            rebuildBeeMesh();
            calculateStage();
            if (typeof applyBeeCustomization === 'function') applyBeeCustomization();
            if (typeof buildHive === 'function') buildHive(); 
            updateStatsUI();
            checkFriends();
            
            hiveGroup.visible = state.hiveUnlocked;
            boxGroup.visible = (!state.hiveUnlocked && (state.stage === 'adult' || state.stage === 'child'));
            logUI(`${state.name}'s memories loaded successfully! 🌻`);
        }
        
        const SAVE_KEY = 'save_v20'; 
        
        if (firebaseConfig) {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            };
            initAuth().then(() => {
                onAuthStateChanged(auth, async (user) => {
                    currentUser = user;
                    if (user) {
                        document.getElementById('sync-status').innerText = "☁️ Cloud Sync Active";
                        document.getElementById('sync-status').className = "text-xs font-semibold text-emerald-600";
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'honey_data', SAVE_KEY);
                        try { const snap = await getDoc(docRef); if (snap.exists()) applyLoadedData(snap.data()); } catch(e) {}
                    }
                });
            });
        } else {
            document.getElementById('sync-status').innerText = "💾 Local Save Active";
            document.getElementById('sync-status').className = "text-xs font-semibold text-blue-600";
            try {
                const localData = localStorage.getItem(`honey_data_${SAVE_KEY}`);
                if (localData) applyLoadedData(JSON.parse(localData));
            } catch(e) { console.error("Local storage error"); }
        }
        
        setInterval(() => {
            calculateStage(); 
            const dataToSave = { 
                name: state.name, birthDate: state.birthDate, totalFood: state.totalFood, totalNectarGathered: state.totalNectarGathered, stage: state.stage, 
                stageStart: state.stageStart, larvaFood: state.larvaFood, childNectar: state.childNectar,
                hiveUnlocked: state.hiveUnlocked, hiveLevel: state.hiveLevel, children: state.children, hourly: state.hourly,
                stats: state.stats, color: state.color, eggColor: state.eggColor, accessory: document.getElementById('sel-accessory').value, 
                friendsUnlocked: state.friendsUnlocked, seeds: state.seeds, lastSaved: new Date().toISOString() 
            };
            if (db && currentUser) {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'honey_data', SAVE_KEY);
                setDoc(docRef, dataToSave, { merge: true }).catch(e => {});
            } else if (!firebaseConfig) {
                try { localStorage.setItem(`honey_data_${SAVE_KEY}`, JSON.stringify(dataToSave)); } catch(e){}
            }
        }, 5000);
        
        document.getElementById('btn-reset').addEventListener('click', async () => {
            resetToEgg();

        let audioCtx, oscillator, filter, gainNode;
        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            oscillator = audioCtx.createOscillator();
            oscillator.type = 'sawtooth'; oscillator.frequency.value = 75;
            filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 350; 
            gainNode = audioCtx.createGain(); gainNode.gain.value = 0; 
            oscillator.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
            oscillator.start();
        }
        function updateAudioBuzz(speed) {
            if (!state.audioEnabled || !audioCtx || (state.stage !== 'adult' && state.stage !== 'child')) return; 
            if (state.isSleeping) {
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2);
                return;
            }
            const targetFreq = 75 + (speed * 100);
            const targetVol = 0.03 + (speed * 0.08);
            oscillator.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
            gainNode.gain.setTargetAtTime(Math.min(targetVol, 0.15), audioCtx.currentTime, 0.1);
        }

                if(audioCtx.state === 'suspended') audioCtx.resume();
                btn.innerHTML = '🔊'; btn.classList.add('bg-amber-100'); btn.classList.remove('bg-white/50');
            } else {
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);

                for(let i=0; i<5; i++) { const petal = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), petalMat); petal.scale.set(1, 1.5, 0.2); const angle = (i / 5) * Math.PI * 2; petal.position.set(Math.cos(angle)*0.15, 0.3, Math.sin(angle)*0.15); petal.rotation.y = -angle; petal.rotation.x = 0.2; bloom.add(petal); }
            } else { 
                const bell = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.4, 0.8, 16, 1, true), new THREE.MeshStandardMaterial({color: 0x5c6bc0, roughness: 0.3, side: THREE.DoubleSide})); bell.position.y = 0.2; bloom.add(bell);
            }
            bloom.rotation.x = 0.2 + Math.random()*0.2; flower.add(bloom); flower.position.copy(intersectPoint); flower.scale.set(0.1, 0.1, 0.1); scene.add(flower); items.push({ mesh: flower, scaleTarget: 1.0 + Math.random()*0.5, type: 'flower' });
            logUI(`Planted a beautiful ${type}! 🌸`);
            timeSinceLastFlower = 0; 
        });

        const clock = new THREE.Clock();
        
        let beeVelocity = new THREE.Vector3();
        let statDecayTimer = 0;
        let autoTimer = 0;
        let lastSleepPrompt = 0;
        let zzzTimer = 0; 
        const targetRotationObj = new THREE.Object3D(); 

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1); 
            const time = clock.getElapsedTime();
            timeSinceLastFlower += dt;
            
            if (isRaining) {
                if (Math.random() < 0.5) { const drop = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5), new THREE.MeshBasicMaterial({color: 0x93c5fd, transparent: true, opacity: 0.6})); drop.position.set((Math.random()-0.5)*100, 40, (Math.random()-0.5)*100); scene.add(drop); rainParticles.push(drop); }
                if (!state.isSleeping && (state.stage === 'adult' || state.stage === 'child') && state.hiveUnlocked) { targetPosition.copy(hiveDoorTarget); if (beeMaster.position.distanceTo(hiveDoorTarget) < 1.0) state.isSleeping = true; }
            }
            for(let i = rainParticles.length - 1; i >= 0; i--) {
                rainParticles[i].position.y -= 40 * dt; if (rainParticles[i].position.y < 0) { scene.remove(rainParticles[i]); rainParticles.splice(i, 1); }
            }
            
            statDecayTimer += dt;
            if(statDecayTimer > 1.0) {
                statDecayTimer = 0;
                if (state.stage !== 'egg') {
                    if (state.isSleeping) {
                        state.stats.energy = Math.min(100, state.stats.energy + 1.0);
                        state.stats.tiredness = Math.max(0, state.stats.tiredness - 1.0);
                        state.stats.hunger -= 0.005; // tiny drop overnight
                        
                        if (state.stats.nectar >= 1) { 
                            state.stats.nectar -= 1; 
                            state.stats.honeyJars += 0.5;
                            if (Math.abs(state.stats.honeyJars % 1) < 0.49) spawnFloatingEmoji('🍯', hiveDoorTarget); 
                        }
                        
                        if (state.stats.energy >= 100 && state.stats.tiredness <= 0 && state.stats.nectar <= 0) {
                            state.isSleeping = false;
                            targetPosition.set(0, 0, 0);
                            beeMaster.visible = true;
                            logUI(`${state.name} feels completely rested and is ready to play! ☀️`);
                        }
                    } else {
                        state.stats.hunger -= 0.01; // Healthy drain (approx 36 pts per hour)
                        if (state.stage === 'adult' || state.stage === 'child') {
                            state.stats.energy -= 0.02; // Very slow natural drain
                            state.stats.tiredness += 0.02; 
                        }
                        
                        if (state.stats.hunger < 30 || state.stats.energy < 20) state.stats.happiness -= 0.5; 
                        else if (state.stats.happiness < 100) state.stats.happiness += 0.1;
                        
                        if (state.stats.tiredness > 75 && time - lastSleepPrompt > 60 && (state.stage === 'adult' || state.stage === 'child')) { 
                            logUI(`${state.name} is getting very tired. 🥱 Tap the hive for bedtime?`); 
                            lastSleepPrompt = time; 
                        }
                    }

                    if (state.stats.hunger <= 0) {
                        state.stats.health -= 0.01; // Active health drain while starving
                        if (Math.floor(state.stats.health) === 40 || Math.floor(state.stats.health) === 20) {
                            logUI(`⚠️ WARNING: ${state.name} is starving! Please feed her!`);
                        }
                        if (state.stats.health <= 0) {
                            resetToEgg(`${state.name} fainted from hunger and reverted back into an egg to heal!`); 
                        }
                    } else {
                        state.stats.health = Math.min(100, state.stats.health + 0.1); 
                    }

                    if (!state.isSleeping && state.hiveUnlocked && (state.stage === 'adult' || state.stage === 'child')) {
                        if (state.stats.nectar >= 30) { 
                            logUI(`${state.name}'s pollen baskets are completely full! Returning to hive.`); 
                            targetPosition.copy(hiveDoorTarget); if (beeMaster.position.distanceTo(hiveDoorTarget) < 1.0) state.isSleeping = true; 
                        } else if (state.stats.nectar > 0 && (state.stats.tiredness > 90 || timeSinceLastFlower > 120)) {
                            logUI(`${state.name} is heading back to the hive to drop off her nectar!`); 
                            targetPosition.copy(hiveDoorTarget); if (beeMaster.position.distanceTo(hiveDoorTarget) < 1.0) state.isSleeping = true; 
                        }
                    }
                } else {
                    state.stats.energy = 100; state.stats.hunger = 100; state.stats.tiredness = 0; state.stats.happiness = 100; state.stats.health = 100;
                }
                updateStatsUI();
            }

            if (state.isSleeping && beeMaster.position.distanceTo(hiveDoorTarget) < 2.0) {
                zzzTimer += dt; if (zzzTimer > 1.0) { const zTexts = ['Z', 'Zz', 'zZz', 'ZZzz', 'z', 'Zzz']; const sizes = ['20px', '28px', '36px', '24px']; spawnFloatingEmoji(zTexts[Math.floor(Math.random() * zTexts.length)], hiveDoorTarget, sizes[Math.floor(Math.random() * sizes.length)]); zzzTimer = 0; }
            }
            if (!state.isSleeping && (state.stage === 'adult' || state.stage === 'child') && beeVelocity.length() > 0.5 && Math.random() > 0.4) {
                const color = new THREE.Color().setHSL((time * 0.5) % 1, 1, 0.6); const p = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshBasicMaterial({color: color, transparent: true, opacity: 0.8})); p.position.copy(beeMaster.position); p.position.y -= 0.5; scene.add(p); trailParticles.push({mesh: p, life: 1.0});
            }
            for(let i = trailParticles.length - 1; i >= 0; i--) { let p = trailParticles[i]; p.life = Math.max(0, p.life - dt * 1.5); if (p.life <= 0) { scene.remove(p.mesh); trailParticles.splice(i, 1); } else { p.mesh.scale.setScalar(p.life); } }
            
            if (state.friendsUnlocked.butterfly && butterflyGroup.visible) { butterflyGroup.position.x = 5 + Math.sin(time * 0.8) * 6; butterflyGroup.position.z = -12 + Math.cos(time * 0.6) * 5; butterflyGroup.position.y = 3 + Math.sin(time * 2.5) * 1.5; butterflyGroup.children[0].rotation.y = Math.sin(time * 20) * 0.8; butterflyGroup.children[1].rotation.y = Math.PI - Math.sin(time * 20) * 0.8; butterflyGroup.rotation.y = Math.atan2(Math.cos(time * 0.6), -Math.sin(time * 0.8)); }
            if (state.friendsUnlocked.ladybug && ladybugGroup.visible) { ladybugGroup.position.x = Math.sin(time * 0.3) * 6; ladybugGroup.position.z = -20 + Math.cos(time * 0.3) * 6; ladybugGroup.rotation.y = -time * 0.3 + Math.PI; }
            if (state.friendsUnlocked.caterpillar && caterpillarGroup.visible) { caterpillarGroup.position.z = 5 + Math.sin(time * 0.2) * 4; caterpillarGroup.position.x = -8 + Math.cos(time * 0.1) * 2; caterpillarGroup.rotation.y = Math.sin(time * 0.1) * 0.5; }
            if (state.friendsUnlocked.dragonfly && dragonflyGroup.visible) { dragonflyGroup.position.x = Math.sin(time * 1.5) * 15; dragonflyGroup.position.z = Math.cos(time * 1.2) * 15; dragonflyGroup.position.y = 8 + Math.sin(time * 4) * 2; dragonflyGroup.rotation.y = -time * 1.5; dragonflyGroup.children[1].rotation.z = Math.sin(time * 50) * 0.5; dragonflyGroup.children[2].rotation.z = -Math.sin(time * 50) * 0.5; }
            if (state.friendsUnlocked.firefly && fireflyGroup.visible) { fireflyGroup.position.x = -5 + Math.sin(time * 1.2) * 5; fireflyGroup.position.z = -10 + Math.cos(time * 0.8) * 4; fireflyGroup.position.y = 4 + Math.sin(time * 3) * 1.5; fireflyGroup.children[1].material.emissiveIntensity = isNightTime ? (0.5 + Math.sin(time * 5) * 0.5) : 0; }
            childBees.forEach((child, i) => { const angle = time + (i * Math.PI/2); child.position.x = beeMaster.position.x + Math.cos(angle)*3; child.position.z = beeMaster.position.z + Math.sin(angle)*3; child.position.y = beeMaster.position.y - 1; });
            
            const targetTreeScale = Math.min(3.0, 0.5 + (state.stats.honeyJars / 2)); // Trees grow faster!
            treeMeshes.forEach(tree => { tree.scale.lerp(new THREE.Vector3(targetTreeScale, targetTreeScale, targetTreeScale), 0.01); });

            if (isBeingPetted) { petTimer -= dt; if (petTimer <= 0) isBeingPetted = false; }
            if (isDoingWaggle) { waggleTimer += dt; if (waggleTimer > 2.5) { isDoingWaggle = false; beeMaster.rotation.set(0,0,0); } }
            items.forEach(item => { if (item.mesh.scale.x < item.scaleTarget) item.mesh.scale.lerp(new THREE.Vector3(item.scaleTarget, item.scaleTarget, item.scaleTarget), 0.1); });
            
            const distToPointer = beeMaster.position.distanceTo(pointerIntersect);
            let interactingWithPointer = false;
            
            if (!state.isSleeping && (state.stage === 'adult' || state.stage === 'child') && !isDraggingEgg && distToPointer < 4) {
                interactingWithPointer = true;
                targetRotationObj.position.copy(beeMaster.position);
                targetRotationObj.lookAt(new THREE.Vector3(pointerIntersect.x, beeMaster.position.y, pointerIntersect.z));
                beeMaster.quaternion.slerp(targetRotationObj.quaternion, 0.1);
                beeVelocity.lerp(new THREE.Vector3(0,0,0), 0.1); 
            }

            const isHidingFromRain = isRaining && (state.stage === 'adult' || state.stage === 'child');
            if (!state.isSleeping && !isBeingPetted && !isDoingWaggle && state.stats.nectar < 30 && !isHidingFromRain && !interactingWithPointer && !isDraggingEgg) {
                autoTimer -= dt;
                if (autoTimer <= 0) {
                    if (items.length > 0) {
                        let priorityItem = state.stage === 'larva' ? (items.find(i => i.type === 'jelly') || items[0]) : (items.find(i => i.type === 'crystal') || items.find(i => i.type === 'treat') || items[0]);
                        targetPosition.copy(priorityItem.mesh.position); autoTimer = 3.0;
                    } else { targetPosition.set((Math.random() - 0.5) * 40, 0, (Math.random() - 0.5) * 40); autoTimer = 2.0 + Math.random() * 3.0; }
                }
            }
            
            const direction = new THREE.Vector3().subVectors(targetPosition, beeMaster.position);
            if (state.stage === 'larva' || state.stage === 'egg') direction.y = 0; else if (!state.isSleeping) direction.y = 0; 
            const distance = direction.length();
            let maxSpeed = state.isSleeping ? 10.0 : 15.0; 
            if (state.stage === 'larva') maxSpeed = 3.0; 
            if (state.stage === 'egg') maxSpeed = 0.0;
            
            const speedMultiplier = (state.stats.energy/100) * (state.stats.hunger/100);
            const activeSpeed = Math.max(maxSpeed * 0.2, maxSpeed * speedMultiplier);
            if (distance > 0.5 && !isBeingPetted && !isDoingWaggle && !interactingWithPointer && !isDraggingEgg) { direction.normalize(); beeVelocity.lerp(direction.multiplyScalar(activeSpeed), 0.1); } 
            else if (!isDraggingEgg) { beeVelocity.lerp(new THREE.Vector3(0,0,0), 0.2); }
            if (!isDraggingEgg) beeMaster.position.addScaledVector(beeVelocity, dt);
            
            const currentSpeed = beeVelocity.length();
            
            // Render visibility based on sleep state
            if (state.isSleeping && distance < 0.5 && (state.stage === 'adult' || state.stage === 'child')) { 
                beeMaster.visible = false; 
            } else {
                beeMaster.visible = true;
                if (isDoingWaggle) { beeMaster.rotation.y = Math.sin(time * 25) * 0.4; beeMaster.position.x += Math.sin(time * 5) * 0.05; beeMaster.position.z += Math.cos(time * 10) * 0.05; } 
                else if (isBeingPetted) { 
                    targetRotationObj.position.copy(beeMaster.position); 
                    const euler = new THREE.Euler().setFromQuaternion(beeMaster.quaternion); 
                    targetRotationObj.rotation.set(0, euler.y + Math.sin(time * 20) * 0.1, 0); 
                    beeMaster.quaternion.slerp(targetRotationObj.quaternion, 0.3); 
                } 
                else if (currentSpeed > 0.1 && !interactingWithPointer) { 
                    const lookPos = beeMaster.position.clone().add(beeVelocity); 
                    targetRotationObj.position.copy(beeMaster.position); 
                    targetRotationObj.lookAt(lookPos); 
                    if (state.stage === 'adult' || state.stage === 'child') {
                        const tilt = speedMultiplier < 0.3 ? -0.3 : 0.2; 
                        targetRotationObj.rotateX(tilt); 
                    }
                    beeMaster.quaternion.slerp(targetRotationObj.quaternion, 0.15); 
                } 
                else if (!interactingWithPointer) { 
                    targetRotationObj.position.copy(beeMaster.position); 
                    const euler = new THREE.Euler().setFromQuaternion(beeMaster.quaternion); 
                    targetRotationObj.rotation.set(0, euler.y, 0); 
                    beeMaster.quaternion.slerp(targetRotationObj.quaternion, 0.1); 
                }
            }
            
            if ((state.stage === 'adult' || state.stage === 'child') && !state.isSleeping) {
                if (!isDoingWaggle && !interactingWithPointer && !isDraggingEgg) beeGroup.position.y = 5.0 + Math.sin(time * 3) * 0.5;
                let flapSpeed = currentSpeed > 1 || isDoingWaggle ? 100 : 60; if (speedMultiplier < 0.3) flapSpeed = 20; 
                wingPivots.forEach(w => w.pivot.rotation.z = (Math.sin(time * flapSpeed) * 0.8) * w.sign);
                const targetLegTuck = (currentSpeed > 3 && !isBeingPetted && !isDoingWaggle && !interactingWithPointer) ? -0.4 : 0.1;
                legs.forEach((leg, index) => { leg.rotation.x += (targetLegTuck - leg.rotation.x) * 0.1; leg.rotation.z += Math.sin(time * 5 + index) * 0.005; });
                const targetPollenSize = Math.max(0.001, Math.min(1.5, state.stats.nectar * 0.2));
                pollenBaskets.forEach(basket => { basket.visible = state.stats.nectar > 0; basket.scale.lerp(new THREE.Vector3(targetPollenSize, targetPollenSize, targetPollenSize), 0.1); });
            } else if (state.stage === 'larva') { 
                beeGroup.position.y = 0.5 + Math.abs(Math.sin(time * 5)) * 0.3; 
            } else if (state.stage === 'egg') {
                beeGroup.position.y = 1.0 + Math.sin(time * 3) * 0.3; 
                beeGroup.rotation.z = Math.sin(time * 4) * 0.1;
                beeGroup.rotation.x = Math.sin(time * 3.5) * 0.1;
            }
            
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i]; const dist2D = Math.hypot(beeMaster.position.x - item.mesh.position.x, beeMaster.position.z - item.mesh.position.z);
                if (state.stage !== 'egg' && dist2D < 3.0 && !state.isSleeping && !isBeingPetted && !isDoingWaggle && !isDraggingEgg) { 
                    scene.remove(item.mesh); items.splice(i, 1);
                    if (item.type === 'jelly' && state.stage === 'larva') { 
                        state.totalFood += 1; state.larvaFood += 1;
                        state.stats.hunger = Math.min(100, state.stats.hunger + 20); 
                        state.stats.energy = Math.min(100, state.stats.energy + 20); 
                        logUI(`The larva ate nutritious Royal Jelly! (${state.larvaFood}/30) 🐛`); 
                    }
                    else if (item.type === 'treat') { 
                        state.stats.hunger = Math.min(100, state.stats.hunger + 50); 
                        state.stats.energy = Math.min(100, state.stats.energy + 50); 
                        state.stats.happiness = Math.min(100, state.stats.happiness + 20); 
                        logUI(`${state.name} guzzled the sugar water! ⚡`); 
                        spawnFloatingEmoji('⚡', beeMaster.position.clone().add(new THREE.Vector3(0, 3, 0))); 
                    } 
                    else if (state.stage === 'adult' || state.stage === 'child') {
                        state.totalFood += 1; 
                        state.stats.hunger = Math.min(100, state.stats.hunger + 30); 
                        state.stats.happiness = Math.min(100, state.stats.happiness + 5);
                        
                        // Working makes her explicitly tired!
                        state.stats.energy = Math.max(0, state.stats.energy - 10);
                        state.stats.tiredness = Math.min(100, state.stats.tiredness + 10);
                        
                        if (item.type === 'crystal') { 
                            state.stats.nectar += 15; state.totalNectarGathered += 15; state.seeds = state.seeds.filter(s => s.id !== item.seedId); 
                            if (state.stage === 'child') state.childNectar += 15;
                            logUI(`AMAZING! ${state.name} ate the Crystal Bloom! 💎`); 
                            spawnFloatingEmoji('💎', beeMaster.position.clone().add(new THREE.Vector3(0, 3, 0))); 
                            isDoingWaggle = true; waggleTimer = 0; 
                        } 
                        else { 
                            state.stats.nectar += 1; state.totalNectarGathered += 1;
                            if (state.stage === 'child') {
                                state.childNectar += 1;
                                logUI(`${state.name} is munching on flowers to grow! (${state.childNectar}/60) 🌸`);
                            } else {
                                logUI(`${state.name} gathered nectar! 🌸`); 
                            }
                        }
                    }
                    updateStatsUI(); if (!isDoingWaggle && (state.stage === 'adult' || state.stage === 'child')) beeMaster.rotateY(Math.PI * 2); 
                }
            }
            updateAudioBuzz(currentSpeed / maxSpeed); renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        
        isSceneReady = true; rebuildBeeMesh(); applyLoadedData(state); renderSeeds(); setTimeout(animate, 100);
    </script>
</body>
</html>
